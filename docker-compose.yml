services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  php:
    build: .
    restart: unless-stopped
    volumes:
      - ./docroot:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docroot:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  cron:
    build: .
    restart: unless-stopped
    volumes:
      - ./docroot:/var/www/html
    depends_on:
      - mysql
      - php
    entrypoint: sh -c "while true; do wp --path=/var/www/html cron event run --due-now --quiet 2>/dev/null; sleep 300; done"

volumes:
  mysql_data:
